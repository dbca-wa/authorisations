apiVersion: apps/v1
kind: Deployment
metadata:
  name: authorisations
  labels:
    app: authorisations-uat
spec:
  selector:
    matchLabels:
      app: authorisations-uat
  template:
    metadata:
      labels:
        app: authorisations-uat
    spec:
      containers:
        - name: authorisations
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: authorisations-env-uat
          volumeMounts:
            - name: prince-license-uat
              mountPath: /usr/lib/prince/license
              readOnly: true
      volumes:
        - name: prince-license-uat
          configMap:
            defaultMode: 0444
            name: prince-license-uat
