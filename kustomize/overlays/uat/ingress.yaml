apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authorisations-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: authorisations-uat-internal-oim03.dbca.wa.gov.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authorisations-clusterip-uat
                port:
                  number: 8080
