apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
nameSuffix: -prod
secretGenerator:
  - name: authorisations-env
    type: Opaque
    envs:
      - .env
configMapGenerator:
  - name: prince-license
    files:
      - license.dat=.prince-license
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../base
  - ingress.yaml
  - pdb.yaml
labels:
  - includeSelectors: true
    pairs:
      variant: prod
patches:
  - path: deployment_patch.yaml
  - path: deployment_hpa_patch.yaml
  - path: service_patch.yaml
images:
  - name: ghcr.io/dbca-wa/authorisations
    newTag: 1.0.0
