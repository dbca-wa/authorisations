# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

resources:
- repo: self

variables:
  group: docker-build
  tag: '$(Build.BuildId)'
  tagDate: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}{0:ss}', pipeline.startTime) ]
  isMain: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  isDev: $[eq(variables['Build.SourceBranch'], 'refs/heads/uploads-backend')]

stages:
- stage: Build
  condition: and(succeeded(), eq(variables.isMain, 'true'))
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          latest
          $(tagDate)
        arguments: |
          --build-arg DATABASE_URL=$(DATABASE_URL)
          --build-arg SECRET_KEY=$(SECRET_KEY)
          --build-arg LOCAL_MEDIA_STORAGE=$(LOCAL_MEDIA_STORAGE)
          --build-arg PRIVATE_MEDIA_ROOT=$(PRIVATE_MEDIA_ROOT)
      env:
        DOCKER_BUILDKIT: 1
    - task: Docker@2
      displayName: Push Docker image
      inputs:
        command: push
        repository: ghcr.io/dbca-wa/authorisations
        containerRegistry: DockerGitHub
        tags: |
              latest
              $(tagDate)
    - task: Docker@2
      displayName: Dev Build image and Push
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/dockerdev/Dockerfile'
        tags: |
              authorisations_dev_latest
              authorisations_dev_$(tagDate)
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker_app_dev
      env:
        DOCKER_BUILDKIT: 1
