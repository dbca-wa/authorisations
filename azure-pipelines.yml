# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  branches:
    include:
    - main
    - uat
    - feature/*

pr: none

resources:
- repo: self

variables:
  - group: docker-build-variables
  - name: tag
    value: '$(Build.BuildId)'
  - name: tagDate
    value: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}.{0:ss}', pipeline.startTime) ]
  
  # Production branch
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - name: imageTagPrefix
      value: production
  
  # UAT branch
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/uat') }}:
    - name: imageTagPrefix
      value: uat
  
  # Feature branches
  - ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/') }}:
    - name: imageTagPrefix
      value: $[replace(replace(variables['Build.SourceBranch'], 'refs/heads/feature/', ''), '/', '-')]

stages:
- stage: Validate
  displayName: Validate Code
  jobs:
  - job: BackendTests
    displayName: Backend pytest
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: UsePythonVersion@0
      displayName: Use Python 3.12
      inputs:
        versionSpec: '3.12'
    - script: python -m pip install --upgrade pip poetry
      displayName: Install Poetry
    - script: |
        cd backend
        poetry install --with dev
      displayName: Install backend dependencies
    - script: |
        cd backend
        poetry run pytest -n auto --cov --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term-missing
      displayName: Run backend tests with coverage
      env:
        DATABASE_URL: sqlite:///:memory:
        SECRET_KEY: $(SECRET_KEY)
        LOCAL_MEDIA_STORAGE: $(LOCAL_MEDIA_STORAGE)
        PRIVATE_MEDIA_ROOT: $(PRIVATE_MEDIA_ROOT)
    - task: PublishCodeCoverageResults@2
      displayName: Publish backend coverage
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/backend/coverage.xml'
        pathToSources: '$(Build.SourcesDirectory)/backend'
        failIfCoverageEmpty: true

  - job: FrontendTests
    displayName: Frontend quality and tests
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: NodeTool@0
      displayName: Use Node.js 22
      inputs:
        versionSpec: '22.x'
    - script: |
        cd frontend
        npm ci --no-audit --no-fund
      displayName: Install frontend dependencies
    - script: |
        cd frontend
        npm run lint
      displayName: Run frontend lint
    - script: |
        cd frontend
        npm run test:coverage
      displayName: Run frontend tests with coverage
    - task: PublishCodeCoverageResults@2
      displayName: Publish frontend coverage
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/frontend/coverage/cobertura-coverage.xml'
        pathToSources: '$(Build.SourcesDirectory)/frontend/src'
        failIfCoverageEmpty: true

- stage: Package
  displayName: Build Docker Image
  dependsOn: Validate
  condition: succeeded('Validate')
  jobs:
  - job: BuildImage
    displayName: Build image and publish artifact
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Login to Docker registry
      inputs:
        command: login
        containerRegistry: DockerGitHub
    - script: |
        docker build \
          --build-arg DATABASE_URL=$(DATABASE_URL) \
          --build-arg SECRET_KEY=$(SECRET_KEY) \
          --build-arg LOCAL_MEDIA_STORAGE=$(LOCAL_MEDIA_STORAGE) \
          --build-arg PRIVATE_MEDIA_ROOT=$(PRIVATE_MEDIA_ROOT) \
          -t dbca-wa/authorisations:$(imageTagPrefix) \
          -t dbca-wa/authorisations:$(imageTagPrefix)-$(tagDate) \
          -f $(Build.SourcesDirectory)/Dockerfile \
          $(Build.SourcesDirectory)
      displayName: Build Docker Image
      env:
        DOCKER_BUILDKIT: 1
    - script: |
        mkdir -p "$(Build.ArtifactStagingDirectory)"
        docker save \
          dbca-wa/authorisations:$(imageTagPrefix) \
          dbca-wa/authorisations:$(imageTagPrefix)-$(tagDate) \
          -o "$(Build.ArtifactStagingDirectory)/authorisations-image.tar"
      displayName: Save Docker image
    - publish: '$(Build.ArtifactStagingDirectory)/authorisations-image.tar'
      displayName: Publish Docker image artifact
      artifact: authorisations-image

- stage: Publish
  displayName: Push Docker Image
  dependsOn: Package
  condition: succeeded('Package')
  jobs:
  - job: PushImage
    displayName: Push image to registry
    pool:
      vmImage: ubuntu-latest
    steps:
    - download: current
      displayName: Download Docker image artifact
      artifact: authorisations-image
    - task: Docker@2
      displayName: Login to Docker registry
      inputs:
        command: login
        containerRegistry: DockerGitHub
    - script: |
        docker load -i "$(Pipeline.Workspace)/authorisations-image/authorisations-image.tar"
        docker push dbca-wa/authorisations:$(imageTagPrefix)
        docker push dbca-wa/authorisations:$(imageTagPrefix)-$(tagDate)
      displayName: Push Docker Image
