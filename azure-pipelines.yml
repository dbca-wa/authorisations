# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  branches:
    include:
    - main
    - uat
    - feature/*

resources:
- repo: self

variables:
  - group: docker-build-variables
  - name: tag
    value: '$(Build.BuildId)'
  - name: tagDate
    value: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}{0:ss}', pipeline.startTime) ]
  - name: isMain
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  - name: isUAT
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/uat')]
  - name: isFeature
    value: $[startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/')]
  - name: featureBranchName
    value: $[replace(replace(variables['Build.SourceBranch'], 'refs/heads/feature/', ''), '/', '-')]
  - name: imageTagPrefix
    value: $[if(eq(variables.isMain, 'true'), 'production', if(eq(variables.isUAT, 'true'), 'uat', if(eq(variables.isFeature, 'true'), concat('feature-', variables['featureBranchName']), 'unknown')))]

stages:
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildThenPush
    displayName: Build then Push
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: DockerGitHub
        repository: dbca-wa/authorisations
        tags: |
          $(imageTagPrefix)
          $(imageTagPrefix)-$(tagDate)
        arguments: |
          --build-arg DATABASE_URL=$(DATABASE_URL)
          --build-arg SECRET_KEY=$(SECRET_KEY)
          --build-arg LOCAL_MEDIA_STORAGE=$(LOCAL_MEDIA_STORAGE)
          --build-arg PRIVATE_MEDIA_ROOT=$(PRIVATE_MEDIA_ROOT)
      env:
        DOCKER_BUILDKIT: 1
    - task: Docker@2
      displayName: Push Docker Image
      condition: succeeded()
      inputs:
        command: push
        containerRegistry: DockerGitHub
        repository: dbca-wa/authorisations
        tags: |
          $(imageTagPrefix)
          $(imageTagPrefix)-$(tagDate)
