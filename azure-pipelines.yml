# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  branches:
    include:
    - main
    - uat
    - feature/*

pr: none

resources:
- repo: self

variables:
  - group: docker-build-variables
  - name: tag
    value: '$(Build.BuildId)'
  - name: tagDate
    value: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}.{0:ss}', pipeline.startTime) ]
  
  # Production branch
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}:
    - name: imageTagPrefix
      value: production
  
  # UAT branch
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/uat') }}:
    - name: imageTagPrefix
      value: uat
  
  # Feature branches
  - ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/') }}:
    - name: imageTagPrefix
      value: $[replace(replace(variables['Build.SourceBranch'], 'refs/heads/feature/', ''), '/', '-')]

stages:
- stage: Validate
  displayName: Validate Code
  jobs:
  - job: DiagnoseEnv
    displayName: Diagnose Library variable resolution
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        echo "=== Azure Pipelines variable group diagnostics ==="
        if [ -n "$MAPPED_DJANGO_SECRET_KEY" ]; then
          echo "DJANGO_SECRET_KEY (Library): SET"
        else
          echo "DJANGO_SECRET_KEY (Library): NOT SET or empty - rename SECRET_KEY to DJANGO_SECRET_KEY in the Library"
        fi
        if [ -n "$MAPPED_LOCAL_MEDIA_STORAGE" ]; then
          echo "LOCAL_MEDIA_STORAGE (Library): SET => $MAPPED_LOCAL_MEDIA_STORAGE"
        else
          echo "LOCAL_MEDIA_STORAGE (Library): NOT SET or empty"
        fi
        if [ -n "$MAPPED_PRIVATE_MEDIA_ROOT" ]; then
          echo "PRIVATE_MEDIA_ROOT (Library): SET => $MAPPED_PRIVATE_MEDIA_ROOT"
        else
          echo "PRIVATE_MEDIA_ROOT (Library): NOT SET or empty"
        fi
        if [ -n "$MAPPED_DATABASE_URL" ]; then
          echo "DATABASE_URL (Library): SET"
        else
          echo "DATABASE_URL (Library): NOT SET or empty"
        fi
      displayName: Report variable group values
      env:
        MAPPED_DJANGO_SECRET_KEY: $(DJANGO_SECRET_KEY)
        MAPPED_LOCAL_MEDIA_STORAGE: $(LOCAL_MEDIA_STORAGE)
        MAPPED_PRIVATE_MEDIA_ROOT: $(PRIVATE_MEDIA_ROOT)
        MAPPED_DATABASE_URL: $(DATABASE_URL)

  - job: BackendTests
    displayName: Backend pytest
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: UsePythonVersion@0
      displayName: Use Python 3.12
      inputs:
        versionSpec: '3.12'
    - script: python -m pip install --upgrade pip poetry
      displayName: Install Poetry
    - script: |
        cd backend
        poetry install --with dev
      displayName: Install backend dependencies
    - script: |
        cd backend
        poetry run pytest -n auto --cov --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-report=term-missing
      displayName: Run backend tests with coverage
      env:
        DATABASE_URL: 'sqlite:///:memory:'
        SECRET_KEY: $(DJANGO_SECRET_KEY)
        # LOCAL_MEDIA_STORAGE must be true in CI so settings.py does not try to
        # read AZURE_ACCOUNT_NAME/AZURE_CONTAINER/AZURE_SAS_TOKEN (not set in CI).
        # test_settings.py overrides the storage backend anyway; this just prevents
        # the settings import from crashing before that override is applied.
        LOCAL_MEDIA_STORAGE: 'true'
        PRIVATE_MEDIA_ROOT: '/tmp/private-media'
    - task: PublishCodeCoverageResults@2
      displayName: Publish backend coverage
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/backend/coverage.xml'
        pathToSources: '$(Build.SourcesDirectory)/backend'
        failIfCoverageEmpty: true

  - job: FrontendTests
    displayName: Frontend quality and tests
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: NodeTool@0
      displayName: Use Node.js 22
      inputs:
        versionSpec: '22.x'
    - script: |
        cd frontend
        npm ci --no-audit --no-fund
      displayName: Install frontend dependencies
    - script: |
        cd frontend
        npm run lint
      displayName: Run frontend lint
    - script: |
        cd frontend
        npm run test:coverage
      displayName: Run frontend tests with coverage
    - task: PublishCodeCoverageResults@2
      displayName: Publish frontend coverage
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/frontend/coverage/cobertura-coverage.xml'
        pathToSources: '$(Build.SourcesDirectory)/frontend/src'
        failIfCoverageEmpty: true

- stage: Package
  displayName: Build Docker Image
  dependsOn: Validate
  condition: succeeded('Validate')
  jobs:
  - job: BuildImage
    displayName: Build Docker image
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        containerRegistry: DockerGitHub
        repository: dbca-wa/authorisations
        tags: |
          $(imageTagPrefix)
          $(imageTagPrefix)-$(tagDate)
        arguments: >-
          --build-arg DATABASE_URL=$(DATABASE_URL)
          --build-arg SECRET_KEY=$(DJANGO_SECRET_KEY)
          --build-arg LOCAL_MEDIA_STORAGE=$(LOCAL_MEDIA_STORAGE)
          --build-arg PRIVATE_MEDIA_ROOT=$(PRIVATE_MEDIA_ROOT)
      env:
        DOCKER_BUILDKIT: 1

- stage: Publish
  displayName: Push Docker Image
  dependsOn: Package
  condition: succeeded('Package')
  jobs:
  - job: PushImage
    displayName: Push Docker image
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Push Docker image
      inputs:
        command: push
        containerRegistry: DockerGitHub
        repository: dbca-wa/authorisations
        tags: |
          $(imageTagPrefix)
          $(imageTagPrefix)-$(tagDate)
